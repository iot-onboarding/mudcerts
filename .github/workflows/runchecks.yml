name: RunChecks

"on":
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
        matrix:
          go-version: [ '1.23' ]
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          go mod download
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v -race ./...

