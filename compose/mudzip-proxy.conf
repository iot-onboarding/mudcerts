# Apache config for the mudmaker container.
#
# mudmaker.js calls fetch("/mudzip") (same-origin), so Apache must
# forward that request to mudzipserver. The mudmaker container shares
# the mudcerts service's network namespace, so localhost:8085 here
# resolves to the Go service.

ProxyRequests Off
ProxyPreserveHost On
ProxyPass        /mudzip http://localhost:8085/mudzip
ProxyPassReverse /mudzip http://localhost:8085/mudzip
